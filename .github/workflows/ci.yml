name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: retail_analytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5432/retail_analytics_test
        run: pytest tests/ -v

      - name: Generate sample data
        run: python generate_data.py

      - name: Run full pipeline against a fresh database
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5432/retail_analytics_test
        run: |
          python -c "
          from sqlalchemy import create_engine, text
          from config.settings import DB_URL
          engine = create_engine(DB_URL)
          with engine.begin() as conn:
              conn.execute(text('DROP SCHEMA IF EXISTS staging CASCADE'))
              conn.execute(text('DROP SCHEMA IF EXISTS warehouse CASCADE'))
          for f in ['retail_analytics_schema.sql', 'retail_analytics_schema_v2_improvements.sql']:
              with engine.begin() as conn:
                  conn.execute(text(open(f).read()))
          "
          python -m etl.run

      - name: Generate business reports against the loaded warehouse
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5432/retail_analytics_test
        run: python -m reports.generate
