services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: retail_analytics
    ports:
      - "5432:5432"
    volumes:
      - ./retail_analytics_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./retail_analytics_schema_v2_improvements.sql:/docker-entrypoint-initdb.d/02_v2_improvements.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
